<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Shine ATA360</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      gap: 60px;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }

    .panel { padding: 60px 40px; border-radius: 12px; }
    .light { background: #f8fafc; }
    .dark  { background: #1a1f36; }
    .label { text-align: center; margin-bottom: 16px; font-size: 14px; font-weight: 600; }
    .label-light { color: #333; }
    .label-dark  { color: #ccc; }

    .logo-container {
      position: relative;
      width: 220px;
      height: 73px;
      overflow: hidden;
    }

    .logo-container img {
      display: block;
      width: 100%;
      height: auto;
    }

    .shine-bar {
      position: absolute;
      top: 0;
      left: -50%;
      width: 40%;
      height: 100%;
      /* Gradiente com bordas ultra-suaves: fade longo em ambos os lados */
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.08) 15%,
        rgba(255,255,255,0.35) 45%,
        rgba(255,255,255,0.35) 55%,
        rgba(255,255,255,0.08) 85%,
        transparent 100%
      );
      transform: skewX(-15deg);
      mix-blend-mode: soft-light;
      pointer-events: none;
      animation: shine 5s ease-in-out infinite;
    }

    @keyframes shine {
      0%, 60% { left: -50%; }
      80%     { left: 150%; }
      100%    { left: 150%; }
    }
  </style>
</head>
<body>
  <div class="panel light">
    <p class="label label-light">Light Mode</p>
    <div class="logo-container">
      <img src="/images/ata360-logo.png" alt="ATA360" width="220" height="73">
      <div class="shine-bar"></div>
    </div>
  </div>

  <div class="panel dark">
    <p class="label label-dark">Dark Mode</p>
    <div class="logo-container">
      <img src="/images/ata360-logo.png" alt="ATA360" width="220" height="73">
      <div class="shine-bar"></div>
    </div>
  </div>
</body>
</html>
