<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Shine ATA360</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      gap: 60px;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }

    .panel { padding: 60px 40px; border-radius: 12px; }
    .light { background: #f8fafc; }
    .dark  { background: #1a1f36; }
    .label { text-align: center; margin-bottom: 16px; font-size: 14px; font-weight: 600; }
    .label-light { color: #333; }
    .label-dark  { color: #ccc; }

    .logo-container {
      position: relative;
      width: 220px;
      height: 73px;
      overflow: hidden;
    }

    .logo-container img {
      display: block;
      width: 100%;
      height: auto;
    }

    .shine-bar {
      position: absolute;
      top: -50%;
      left: 0;
      width: 25%;
      height: 200%;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.2) 48%,
        rgba(255,255,255,0.45) 50%,
        rgba(255,255,255,0.2) 52%,
        rgba(255,255,255,0) 100%
      );
      mix-blend-mode: overlay;
      pointer-events: none;
      transform: rotate(35deg) translateX(-150%);
      animation: shine 5s ease-in-out infinite;
    }

    @keyframes shine {
      0%, 60% { transform: rotate(35deg) translateX(-150%); }
      80%, 100% { transform: rotate(35deg) translateX(250%); }
    }
  </style>
</head>
<body>
  <div class="panel light">
    <p class="label label-light">Light Mode</p>
    <div class="logo-container">
      <img src="/images/ata360-logo.png" alt="ATA360" width="220" height="73">
      <div class="shine-bar"></div>
    </div>
  </div>

  <div class="panel dark">
    <p class="label label-dark">Dark Mode</p>
    <div class="logo-container">
      <img src="/images/ata360-logo.png" alt="ATA360" width="220" height="73">
      <div class="shine-bar"></div>
    </div>
  </div>
</body>
</html>
