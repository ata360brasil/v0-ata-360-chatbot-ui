# ------------------------------------------------------------
# 1. DFD - DOCUMENTO DE FORMALIZAÇÃO DA DEMANDA
# ------------------------------------------------------------
DFD:
  nome: "Documento de Formalização da Demanda"
  sigla: "DFD"
  trilha_posicao: 2
  trilha_progresso: 20
  
  fundamentacao_cabecalho:
    - "Lei 14.133/2021: Art. 18, I (DFD como primeiro documento)"
    - "Decreto 10.947/2022: Art. 7º (requisitos do DFD)"
    - "IN SEGES/ME 58/2022: Art. 5º (conteúdo obrigatório)"
    - "TCU Acórdão 2.622/2015-P (motivação da necessidade)"
  
  secoes:
    - numero: 1
      titulo: "Identificação da Demanda"
      fundamento: "Art. 7º, I a III, Decreto 10.947/2022"
      campos: [unidade_requisitante, responsavel_nome, responsavel_cargo, responsavel_matricula, responsavel_contato]
    
    - numero: 2
      titulo: "Objeto da Contratação"
      fundamento: "Art. 6º, XXIII, Lei 14.133/2021"
      campos: [descricao_objeto, natureza, enquadramento]
    
    - numero: 3
      titulo: "Justificativa da Necessidade"
      fundamento: "Art. 18, I, Lei 14.133/2021"
      campos: [necessidade, interesse_publico, consequencias]
    
    - numero: 4
      titulo: "Quantitativos e Estimativa de Valor"
      fundamento: "Art. 18, II e III, Lei 14.133/2021"
      campos: [itens, fonte_estimativa, metodologia_calculo]
    
    - numero: 5
      titulo: "Prazo e Vinculação ao Planejamento"
      fundamento: "Art. 18, VII, Lei 14.133/2021"
      campos: [prazo_desejado, prioridade, pca_item, fonte_recursos, dotacao]
  
  checklist:
    - codigo: "DFD-01"
      texto: "Unidade requisitante e responsável identificados"
      fundamento: "Art. 7º, I, Dec. 10.947/2022"
    - codigo: "DFD-02"
      texto: "Objeto descrito de forma clara e objetiva"
      fundamento: "Art. 6º, XXIII, Lei 14.133/2021"
    - codigo: "DFD-03"
      texto: "Justificativa da necessidade fundamentada"
      fundamento: "Art. 18, I, Lei 14.133/2021"
    - codigo: "DFD-04"
      texto: "Quantitativos estimados com metodologia"
      fundamento: "Art. 18, II, Lei 14.133/2021"
    - codigo: "DFD-05"
      texto: "Valor estimado com base em pesquisa"
      fundamento: "Art. 18, III, Lei 14.133/2021"
    - codigo: "DFD-06"
      texto: "Vinculação ao PCA verificada"
      fundamento: "Art. 18, VII, Lei 14.133/2021"
    - codigo: "DFD-07"
      texto: "Dotação orçamentária indicada"
      fundamento: "Art. 72, VI, Lei 14.133/2021"
  
  assinaturas:
    - papel: "Elaboração"
      tipo: "responsavel"
    - papel: "Validação / Autoridade"
      tipo: "autoridade"

