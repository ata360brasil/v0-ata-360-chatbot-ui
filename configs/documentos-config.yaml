# ============================================================
# LINDB — LEI 13.655/2018 (Blindagem do Gestor)
# ============================================================
LINDB:
  titulo: "Lei de Introdução às Normas do Direito Brasileiro"
  norma: "Lei 13.655/2018 (alterou Dec-Lei 4.657/1942)"
  nota: "Artigos 20-30 adicionados em 2018 — proteção ao gestor público"

  artigos:
    - numero: "Art. 20"
      protecao: "Proibido decidir com base em valores jurídicos abstratos"
      texto: "Nas esferas administrativa, controladora e judicial, não se decidirá com base em valores jurídicos abstratos sem que sejam consideradas as consequências práticas da decisão"
      aplicacao_ata360: "Dados concretos de APIs (PNCP, IBGE, BCB) em toda justificativa"
      documentos: [DFD, ETP, JCD, TR]

    - numero: "Art. 21"
      protecao: "Regime de transição para nova interpretação"
      texto: "A decisão que decretar a invalidação de ato não indicará de modo expresso suas consequências jurídicas e administrativas"
      aplicacao_ata360: "Alerta automático quando jurisprudência TCU muda"
      documentos: [AUDITOR]

    - numero: "Art. 22"
      protecao: "Considerar dificuldades reais do gestor"
      texto: "Na interpretação de normas sobre gestão pública, serão considerados os obstáculos e as dificuldades reais do gestor"
      aplicacao_ata360: "Seção obrigatória de contexto local (IDH, orçamento, quadro funcional)"
      documentos: [ETP, JCD, MR]

    - numero: "Art. 23"
      protecao: "Regime de transição quando nova orientação"
      texto: "A decisão administrativa que estabelecer interpretação ou orientação nova sobre norma de conteúdo indeterminado impondo novo dever ou novo condicionamento de direito, deverá prever regime de transição"
      aplicacao_ata360: "LEGAL_SYNC Agent monitora DOU e alerta sobre mudanças"
      documentos: [AUDITOR, LEGAL_SYNC]

    - numero: "Art. 28"
      protecao: "Responsabilização pessoal somente com dolo ou erro grosseiro"
      texto: "O agente público responderá pessoalmente por suas decisões ou opiniões técnicas em caso de dolo ou erro grosseiro"
      aplicacao_ata360: "Decisão fundamentada com dados concretos ≠ erro grosseiro"
      documentos: [DFD, ETP, JCD, TR, MR]

    - numero: "Art. 30"
      protecao: "Compensação por invalidade retroativa"
      texto: "As autoridades públicas devem atuar para aumentar a segurança jurídica na aplicação das normas"
      aplicacao_ata360: "Registro completo da cadeia de decisão (hash, timestamp, fontes)"
      documentos: [TODOS]

